# ─────────────────────────────────────────────────────────────
# 하퍼세븐 Docker Compose
#   실행:  docker compose up -d --build
#   중지:  docker compose down
#
# OpenAI 키는 아래 두 가지 방법 중 하나로 주입합니다.
#   (A) 프로젝트 루트에 .env 파일 생성 (compose 가 자동으로 읽음)
#         OPENAI_API_KEY=sk-...
#         OPENAI_MODEL=gpt-5.5
#   (B) 셸 환경변수로 전달:  OPENAI_API_KEY=sk-... docker compose up -d
#
# 키가 없으면 AI 채팅만 데모 모드로 동작하고 나머지 기능은 정상입니다.
# ─────────────────────────────────────────────────────────────
services:
  web:
    build: .
    image: haperseven:latest
    container_name: haperseven
    ports:
      - "3000:3000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
    restart: unless-stopped
